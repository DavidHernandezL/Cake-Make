<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Iconos -->
        <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">

        <!-- Logo -->
        <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon">

        <!-- Google Fonts  -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

        <!-- Normalize CSS -->
        <link rel="stylesheet" href="./css/normalize.css">

        <!-- Custom CSS -->
        <link rel="stylesheet" href="./css/styles.css">

        <title>Crear Pedido</title>
    </head>
    <body>
        
        <header>
            <nav class="nav">
                <a class="nav-logo" href="#">
                    <img class="logo-img" src="./img/logo.png" alt="Logo">
                </a>

                <ul class="navbar">
                    <li class="navbar-item">
                        <a href="./index.html" class="navbar-link"><i class="uil uil-estate icon"></i>  Inicio</a>
                    </li>
                    <li class="navbar-item">
                        <a href="#" class="navbar-link"><i class="uil uil-users-alt icon"></i>  Quienes Somos</a>
                    </li>
                    <li class="navbar-item">
                        <a href="#" class="navbar-link"><i class="uil uil-crockery icon"></i>  Pasteles</a>
                    </li>
                    <li class="navbar-item">
                        <a href="" class="navbar-link"><i class="uil uil-crockery icon"></i>  Crear Pastel</a>
                    </li>
                </ul>

            </nav>
        </header>

        <main>
            <div class="principal">
                <form class="pedido" action="get">
                    <div class="datos">
                        <label for="name">Nombre</label>
                        <input type="text" id="name" placeholder="David Hernandez">

                        <label for="tel">Telefono</label>
                        <input type="tel" id="tel" placeholder="2311459545">

                        <label for="email">Correo</label>
                        <input type="email" id="email" placeholder="david@email.com">
                        
                        <label for="desc">Descripcion del pedido</label>
                        <textarea name="desc" id="desc" cols="30" rows="10"></textarea>
                    </div>


                    <div>
                        <label for="sab">Sabores</label>
                        <div>
                            <input type="checkbox" name="sab" id="sab"><label for="sab">Vainilla</label>
                            <input type="checkbox" name="sab" id="sab"><label for="sab">Chocolate</label>
                            <input type="checkbox" name="sab" id="sab"><label for="sab">Fresa</label>
                            <input type="checkbox" name="sab" id="sab"><label for="sab">Limon</label>
                        </div>
                    </div>

                    <div>
                        <label for="sab">Adornos</label>
                        <div>
                            <input type="checkbox" name="sab" id="sab"><label for="sab">Galletas</label>
                            <input type="checkbox" name="sab" id="sab"><label for="sab">Chispas</label>
                            <input type="checkbox" name="sab" id="sab"><label for="sab">Gomitas</label>
                            <input type="checkbox" name="sab" id="sab"><label for="sab">Dulces</label>
                        </div>
                    </div>
                    
                    <input type="submit" value="Hacer pedido">
                </form>
            </div>
        </main>

        <footer >
            <ul class="footer">
                <li class="social">
                    <a href="https://www.instagram.com">
                        <i class="uil uil-instagram icon"></i>
                    </a>
                </li>
                <li class="social">
                    <a href="https://www.facebook.com">
                        <i class="uil uil-facebook-messenger-alt icon"></i>
                    </a>
                </li>
                <li class="social">
                    <a href="https://www.twitter.com">
                        <i class="uil uil-twitter-alt icon"></i>
                    </a>
                </li>
                <li>
                    <i class="uil uil-sign-alt icon"></i>
                        Calle Principal No.1 México
                </li>
                <li>
                    <i class="uil uil-clock icon"></i>
                        8:00 am - 9:00 pm
                </li>
            </ul>

        </footer>
    </body>
</html>
